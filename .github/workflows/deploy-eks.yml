name: Deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (skip build)"
        required: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: outline
  EKS_CLUSTER: outline-demo
  K8S_NAMESPACE: outline

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    if: github.event.inputs.image_tag == ''
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        id: base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}-base:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=app
          cache-to: type=gha,scope=app,mode=max
          build-args: |
            BASE_IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}-base:${{ github.sha }}

      - name: Output image
        id: image
        run: echo "image=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    if: always() && (needs.build-and-push.result == 'success' || github.event.inputs.image_tag != '')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Determine image
        id: img
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ needs.build-and-push.outputs.image }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/outline-web outline="${{ steps.img.outputs.image }}" -n ${{ env.K8S_NAMESPACE }}
          kubectl set image deployment/outline-worker outline="${{ steps.img.outputs.image }}" -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/outline-web -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ -n "${{ secrets.FEISHU_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"msg_type\":\"interactive\",\"card\":{\"header\":{\"title\":{\"tag\":\"plain_text\",\"content\":\"Outline Deploy ${STATUS}\"},\"template\":\"$([ \"$STATUS\" = 'success' ] && echo green || echo red)\"},\"elements\":[{\"tag\":\"div\",\"fields\":[{\"is_short\":true,\"text\":{\"tag\":\"lark_md\",\"content\":\"**Commit:** ${{ github.sha }}\"}},{\"is_short\":true,\"text\":{\"tag\":\"lark_md\",\"content\":\"**Actor:** ${{ github.actor }}\"}}]}]}}" || true
          fi
